<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Aurelia — Luxury Wedding Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ivory:#FDFBF8; --paper:#FFFFFF; --champagne:#F4EADD; --champagne-deep:#E8D9C5;
  --blush:#F7E4E1; --blush-deep:#E3B6B0; --sage:#A9B8A4; --sage-deep:#7E9078;
  --gold:#C2A15C; --gold-soft:#E4D2AE;
  --ink:#2E2A26; --ink-soft:#5C544C; --muted:#948C82; --line:#EDE5DA;
  --field:#FBF7F1; --overlay:rgba(46,42,38,.28);
  --shadow:0 1px 2px rgba(46,42,38,.04), 0 8px 24px rgba(46,42,38,.06);
  --shadow-lift:0 2px 6px rgba(46,42,38,.06), 0 18px 44px rgba(46,42,38,.10);
  --r:22px; --r-sm:14px; --pill:999px;
  --ease:cubic-bezier(.22,.61,.36,1);
}
html[data-theme="dark"]{
  --ivory:#141210; --paper:#1D1A18; --champagne:#2B2520; --champagne-deep:#3A322A;
  --blush:#312624; --blush-deep:#C2938C; --sage:#6F7F6A; --sage-deep:#A3B79D;
  --gold:#D8B978; --gold-soft:#5A4A2C;
  --ink:#F2EAE0; --ink-soft:#C8BEB2; --muted:#948A7E; --line:#332C26;
  --field:#242019; --overlay:rgba(0,0,0,.55);
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.35);
  --shadow-lift:0 2px 8px rgba(0,0,0,.4), 0 22px 50px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--ivory); color:var(--ink);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:14.5px; line-height:1.6; -webkit-font-smoothing:antialiased;
  transition:background .5s var(--ease), color .5s var(--ease);
}
h1,h2,h3,.display{font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;letter-spacing:.01em;line-height:1.15}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
a{color:var(--gold);text-decoration:none}
::selection{background:var(--blush);color:var(--ink)}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms !important;transition-duration:.01ms !important}}

/* ---------- Petal / ornament ---------- */
.orn{display:block;margin:0 auto;opacity:.55}
.eyebrow{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:500}

/* ---------- Shell ---------- */
.shell{display:flex;min-height:100vh}
.sidebar{
  width:246px;flex:0 0 246px;background:var(--paper);border-right:1px solid var(--line);
  padding:26px 14px 30px;position:sticky;top:0;height:100vh;overflow-y:auto;
  scrollbar-width:thin;transition:transform .45s var(--ease), background .5s var(--ease);z-index:60;
}
.sidebar::-webkit-scrollbar{width:5px}
.sidebar::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px}
.brand{text-align:center;padding:6px 8px 20px;border-bottom:1px solid var(--line);margin-bottom:16px}
.brand .mark{font-family:'Cormorant Garamond',serif;font-size:29px;letter-spacing:.14em;color:var(--ink)}
.brand .mark em{font-style:italic;color:var(--gold)}
.brand .sub{font-size:9.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);margin-top:5px}
.navgroup{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding:16px 12px 7px;font-weight:500}
.nav a{
  display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r-sm);
  color:var(--ink-soft);font-size:13.5px;font-weight:400;transition:all .28s var(--ease);position:relative;
}
.nav a .ico{width:19px;text-align:center;font-size:14px;filter:saturate(.85)}
.nav a:hover{background:var(--champagne);color:var(--ink)}
.nav a.on{background:linear-gradient(100deg,var(--blush),var(--champagne));color:var(--ink);font-weight:500}
.nav a.on::before{content:"";position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:3px;height:19px;background:var(--gold);border-radius:0 3px 3px 0}
.nav a .count{margin-left:auto;font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;
  padding:15px 34px;background:color-mix(in srgb,var(--ivory) 82%,transparent);
  backdrop-filter:saturate(180%) blur(18px);-webkit-backdrop-filter:saturate(180%) blur(18px);
  border-bottom:1px solid var(--line);
}
.topbar h1{font-size:25px}
.topbar .where{font-size:11px;color:var(--muted);letter-spacing:.06em}
.spacer{flex:1}
.iconbtn{width:36px;height:36px;border-radius:var(--pill);display:grid;place-items:center;
  background:var(--paper);border:1px solid var(--line);transition:all .3s var(--ease);font-size:15px}
.iconbtn:hover{background:var(--champagne);transform:translateY(-1px);box-shadow:var(--shadow)}
.burger{display:none}
.content{padding:30px 34px 90px;max-width:1240px;width:100%;animation:rise .5s var(--ease)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ---------- Cards ---------- */
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:22px 24px;box-shadow:var(--shadow);transition:all .35s var(--ease)}
.card.hoverable:hover{transform:translateY(-2px);box-shadow:var(--shadow-lift);border-color:var(--champagne-deep)}
.card h3{font-size:20px;margin-bottom:2px}
.card .card-h{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.grid{display:grid;gap:18px}
.g2{grid-template-columns:repeat(2,minmax(0,1fr))}
.g3{grid-template-columns:repeat(3,minmax(0,1fr))}
.g4{grid-template-columns:repeat(4,minmax(0,1fr))}
.auto{grid-template-columns:repeat(auto-fill,minmax(268px,1fr))}
.stack{display:flex;flex-direction:column;gap:18px}
.split{display:grid;gap:18px}
.split.left{grid-template-columns:300px minmax(0,1fr)}
.split.right{grid-template-columns:minmax(0,1fr) 300px}
.span2{grid-column:span 2}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* ---------- Buttons ---------- */
.btn{padding:9px 18px;border-radius:var(--pill);font-size:13px;font-weight:500;letter-spacing:.02em;
  transition:all .3s var(--ease);border:1px solid transparent;display:inline-flex;align-items:center;gap:7px}
.btn-p{background:var(--ink);color:var(--ivory)}
.btn-p:hover{transform:translateY(-1px);box-shadow:var(--shadow-lift);opacity:.92}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--gold-soft));color:#3B2E12}
html[data-theme="dark"] .btn-g{color:#221B0C}
.btn-g:hover{transform:translateY(-1px);box-shadow:var(--shadow-lift)}
.btn-o{background:var(--paper);border-color:var(--line);color:var(--ink-soft)}
.btn-o:hover{background:var(--champagne);color:var(--ink)}
.btn-q{background:transparent;color:var(--muted);padding:6px 10px}
.btn-q:hover{color:var(--ink)}
.btn-danger{background:transparent;color:#B4685E;border-color:transparent}
.btn-danger:hover{background:var(--blush)}

/* ---------- Forms ---------- */
label.f{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:500}
.inp,select.inp,textarea.inp{
  width:100%;padding:10px 13px;background:var(--field);border:1px solid var(--line);
  border-radius:var(--r-sm);transition:all .28s var(--ease);font-size:14px;color:var(--ink);
}
.inp:focus{outline:none;border-color:var(--gold);background:var(--paper);box-shadow:0 0 0 3px color-mix(in srgb,var(--gold) 16%,transparent)}
textarea.inp{min-height:88px;resize:vertical;line-height:1.6}
select.inp{appearance:none;background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='11' height='7'%3E%3Cpath d='M1 1l4.5 4.5L10 1' stroke='%23948C82' stroke-width='1.4' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center;padding-right:34px}
.field{margin-bottom:15px}
.field.half{width:calc(50% - 8px)}
.fieldrow{display:flex;gap:16px;flex-wrap:wrap}
.fieldrow>.field{flex:1 1 200px;margin-bottom:15px}

/* ---------- Modal ---------- */
.modal-bg{position:fixed;inset:0;background:var(--overlay);backdrop-filter:blur(6px);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .3s var(--ease)}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--paper);border-radius:26px;width:min(620px,100%);max-height:88vh;overflow-y:auto;
  box-shadow:var(--shadow-lift);animation:pop .42s var(--ease);border:1px solid var(--line)}
@keyframes pop{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:22px 26px 12px}
.modal-h h3{font-size:23px}
.modal-b{padding:6px 26px 8px}
.modal-f{display:flex;gap:10px;justify-content:flex-end;padding:14px 26px 24px;position:sticky;bottom:0;background:var(--paper)}

/* ---------- Misc ---------- */
.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:var(--pill);
  font-size:11px;font-weight:500;letter-spacing:.04em;background:var(--champagne);color:var(--ink-soft)}
.tag.sage{background:color-mix(in srgb,var(--sage) 34%,var(--paper));color:var(--sage-deep)}
.tag.blush{background:var(--blush);color:var(--blush-deep)}
.tag.gold{background:color-mix(in srgb,var(--gold) 22%,var(--paper));color:var(--gold)}
.tag.grey{background:var(--field);color:var(--muted)}
.bar{height:7px;border-radius:var(--pill);background:var(--champagne);overflow:hidden}
.bar>i{display:block;height:100%;border-radius:var(--pill);background:linear-gradient(90deg,var(--blush-deep),var(--gold));transition:width 1s var(--ease)}
.stat{font-family:'Cormorant Garamond',serif;font-size:36px;line-height:1;font-variant-numeric:tabular-nums}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.tiny{font-size:11px}
.empty{text-align:center;padding:52px 20px;color:var(--muted)}
.empty .big{font-family:'Cormorant Garamond',serif;font-size:23px;color:var(--ink-soft);margin:10px 0 6px}
.divider{height:1px;background:var(--line);margin:18px 0}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{padding:6px 14px;border-radius:var(--pill);background:var(--paper);border:1px solid var(--line);
  font-size:12.5px;color:var(--ink-soft);transition:all .28s var(--ease)}
.chip:hover{background:var(--champagne)}
.chip.on{background:var(--ink);color:var(--ivory);border-color:var(--ink)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:500;padding:0 12px 10px}
td{padding:12px;border-top:1px solid var(--line);vertical-align:middle}
tbody tr{transition:background .25s var(--ease)}
tbody tr:hover{background:var(--field)}
.tablewrap{overflow-x:auto;margin:0 -6px}
.check{width:21px;height:21px;border-radius:7px;border:1.5px solid var(--line);background:var(--paper);
  display:grid;place-items:center;flex:0 0 auto;transition:all .25s var(--ease);font-size:12px;color:transparent}
.check:hover{border-color:var(--sage)}
.check.on{background:var(--sage-deep);border-color:var(--sage-deep);color:#fff}
.star{font-size:15px;opacity:.28;transition:all .25s var(--ease)}
.star.on{opacity:1;filter:none}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--ivory);
  padding:11px 22px;border-radius:var(--pill);font-size:13px;z-index:400;box-shadow:var(--shadow-lift);animation:toastin .4s var(--ease)}
@keyframes toastin{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}

/* ---------- Dashboard hero ---------- */
.hero{position:relative;overflow:hidden;border-radius:30px;padding:44px 34px 40px;text-align:center;
  background:linear-gradient(150deg,var(--blush) 0%,var(--champagne) 48%,var(--paper) 100%);
  border:1px solid var(--champagne-deep);box-shadow:var(--shadow)}
.hero .petals{position:absolute;inset:0;pointer-events:none;opacity:.5}
.hero-inner{position:relative;z-index:2}
.hero .names{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,5vw,50px);font-weight:300;letter-spacing:.02em}
.hero .names .amp{font-style:italic;color:var(--gold);padding:0 8px}
.hero .meta{font-size:11.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-soft);margin-top:10px}
.ring{margin:26px auto 6px;position:relative;width:212px;height:212px}
.ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring .mid{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.ring .num{font-family:'Cormorant Garamond',serif;font-size:62px;line-height:.95;font-variant-numeric:tabular-nums}
.ring .lbl{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-soft);margin-top:7px}
.ringtrack{stroke:color-mix(in srgb,var(--gold) 20%,transparent)}
.ringfill{stroke:var(--gold);stroke-linecap:round;transition:stroke-dashoffset 1.6s var(--ease)}
.pills{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:18px}
.pillstat{background:color-mix(in srgb,var(--paper) 72%,transparent);border:1px solid var(--champagne-deep);
  border-radius:var(--pill);padding:7px 16px;font-size:12px;color:var(--ink-soft)}
.pillstat b{font-weight:600;color:var(--ink)}

/* ---------- Checklist ---------- */
.task{display:flex;gap:12px;align-items:flex-start;padding:11px 4px;border-bottom:1px solid var(--line);transition:opacity .3s var(--ease)}
.task:last-child{border-bottom:none}
.task.done .tt{text-decoration:line-through;color:var(--muted)}
.task .tt{flex:1;min-width:0}
.task .tname{font-size:14px}
.task .tmeta{display:flex;gap:9px;flex-wrap:wrap;margin-top:4px;align-items:center}
.phase{margin-bottom:8px}
.phase-h{display:flex;align-items:center;gap:12px;cursor:pointer;padding:14px 4px}
.phase-h .ph-title{font-family:'Cormorant Garamond',serif;font-size:22px}
.phase-h .arrow{transition:transform .35s var(--ease);color:var(--muted);font-size:11px}
.phase.closed .arrow{transform:rotate(-90deg)}
.phase.closed .phase-b{display:none}

/* ---------- Seating ---------- */
.tables{display:grid;grid-template-columns:repeat(auto-fill,minmax(214px,1fr));gap:16px}
.tbl{background:var(--paper);border:1px dashed var(--champagne-deep);border-radius:var(--r);padding:16px;min-height:150px;transition:all .3s var(--ease)}
.tbl.over{border-color:var(--gold);background:var(--champagne);transform:scale(1.02)}
.tbl h4{font-family:'Cormorant Garamond',serif;font-size:18px;display:flex;justify-content:space-between;align-items:center}
.seatpill{background:var(--field);border:1px solid var(--line);border-radius:var(--pill);padding:5px 12px;font-size:12.5px;
  margin:5px 5px 0 0;display:inline-flex;align-items:center;gap:7px;cursor:grab;transition:all .25s var(--ease)}
.seatpill:hover{border-color:var(--gold);background:var(--champagne)}
.seatpill.dragging{opacity:.4}
.pool{background:var(--field);border-radius:var(--r);padding:16px;border:1px solid var(--line);min-height:88px}

/* ---------- Calendar ---------- */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal .dow{text-align:center;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding:6px 0}
.cell{min-height:92px;border-radius:12px;border:1px solid var(--line);padding:7px 8px;background:var(--paper);transition:all .28s var(--ease);cursor:pointer}
.cell:hover{background:var(--field);border-color:var(--champagne-deep)}
.cell.out{opacity:.32}
.cell.today{border-color:var(--gold);box-shadow:0 0 0 2px color-mix(in srgb,var(--gold) 18%,transparent)}
.cell.wed{background:linear-gradient(150deg,var(--blush),var(--champagne))}
.cell .d{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.ev{font-size:10.5px;background:var(--champagne);border-left:2px solid var(--gold);border-radius:5px;padding:2px 5px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ---------- Gallery ---------- */
.gallery{columns:4 210px;column-gap:14px}
.gitem{break-inside:avoid;margin-bottom:14px;border-radius:16px;overflow:hidden;position:relative;background:var(--champagne);box-shadow:var(--shadow);transition:all .35s var(--ease)}
.gitem:hover{transform:translateY(-3px);box-shadow:var(--shadow-lift)}
.gitem img{width:100%;display:block}
.gitem .cap{position:absolute;left:0;right:0;bottom:0;padding:22px 12px 10px;color:#fff;font-size:12px;
  background:linear-gradient(transparent,rgba(0,0,0,.6));display:flex;justify-content:space-between;align-items:center}

/* ---------- Website preview ---------- */
.site{border-radius:26px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow-lift)}
.site-hero{padding:64px 30px;text-align:center;background:linear-gradient(160deg,var(--blush),var(--champagne) 60%,var(--paper))}
.site-hero .n{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,6vw,58px);font-weight:300}
.site-body{background:var(--paper);padding:34px 30px}

/* ---------- Responsive ---------- */
@media (max-width:1080px){.g4{grid-template-columns:repeat(2,minmax(0,1fr))}.g3{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:860px){
  .burger{display:grid}
  .split.left,.split.right{grid-template-columns:1fr}
  .span2{grid-column:span 1}
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);box-shadow:var(--shadow-lift)}
  .sidebar.open{transform:none}
  .scrim{position:fixed;inset:0;background:var(--overlay);z-index:55;animation:fade .3s var(--ease)}
  .content{padding:22px 18px 90px}
  .topbar{padding:12px 18px}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .gallery{columns:2 140px}
  .cell{min-height:64px}
}
@media print{.sidebar,.topbar,.noprint{display:none !important}.content{padding:0}.card{box-shadow:none;break-inside:avoid}}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="mark">AUR<em>e</em>LIA</div>
      <div class="sub">Wedding Atelier</div>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <div class="main">
    <header class="topbar">
      <button class="iconbtn burger" id="burger" aria-label="Open menu">☰</button>
      <div>
        <h1 id="pageTitle">Dashboard</h1>
        <div class="where" id="pageSub"></div>
      </div>
      <div class="spacer"></div>
      <button class="iconbtn" id="themeBtn" title="Switch between light and dark">◐</button>
    </header>
    <main class="content" id="view"></main>
  </div>
</div>
<script>
/* ============================================================
   AURELIA — Luxury Wedding Planner
   Single file. Everything is saved in this browser.
   ============================================================ */
const KEY='aurelia.wedding.v1';
let mem=null;
const store={
  read(){ try{ return JSON.parse(localStorage.getItem(KEY)||'null'); }catch(e){ return mem; } },
  write(d){ try{ localStorage.setItem(KEY,JSON.stringify(d)); }catch(e){ mem=d; } }
};
const uid=()=>Math.random().toString(36).slice(2,10);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money=n=>'$'+(Number(n)||0).toLocaleString(undefined,{maximumFractionDigits:2});
const todayISO=()=>new Date().toISOString().slice(0,10);
const fmtDate=d=>{ if(!d) return '—'; const x=new Date(d+'T12:00:00'); return isNaN(x)?'—':x.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); };

/* ---------- Seed content ---------- */
const PHASES=['12+ months out','10–12 months out','8–10 months out','6–8 months out','4–6 months out','2–4 months out','1 month out','Week of','Day of','After the wedding'];

/* ---------- Default state ---------- */
function seedTasks(){
  const out=[];
  SEED_TASKS.forEach(([phase,list])=>list.forEach(t=>out.push({id:uid(),phase,name:t,done:false,star:false,due:'',note:''})));
  return out;
}
function blank(){
  return {
    theme:'light',
    details:{partnerA:'',partnerB:'',date:'',time:'',venue:'',city:'',theme:'',dress:'',guestCount:'',website:'',hashtag:'',ceremony:'',reception:''},
    budgetTotal:22000,
    tasks:seedTasks(),
    expenses:[], guests:[], tables:[], events:[], vendors:[], invitations:[], registry:[],
    music:[], menu:[], cake:[], decor:[], outfits:[], beauty:[], honeymoon:[], documents:[],
    gallery:[], notes:[], contacts:[], activity:[],
    collapsed:{}
  };
}
let S=store.read()||blank();
(function migrate(){ const b=blank(); for(const k in b){ if(S[k]===undefined) S[k]=b[k]; } })();
function save(){ store.write(S); }
function log(text){ S.activity.unshift({id:uid(),text,at:new Date().toISOString()}); S.activity=S.activity.slice(0,40); }
function commit(msg){ save(); if(msg){ log(msg); save(); toast(msg);} render(); }
function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';},2100); setTimeout(()=>t.remove(),2600); }

/* ---------- Derived ---------- */
function daysUntil(){ if(!S.details.date) return null; const d=new Date(S.details.date+'T12:00:00'); if(isNaN(d)) return null; return Math.ceil((d-new Date().setHours(0,0,0,0))/86400000); }
function progress(){ const t=S.tasks.length||1; return Math.round(S.tasks.filter(x=>x.done).length/t*100); }
function spent(){ return S.expenses.reduce((a,e)=>a+(Number(e.paid)||0),0); }
function committed(){ return S.expenses.reduce((a,e)=>a+(Number(e.estimate)||0),0); }

function collView(cfg){
  const list=S[cfg.key];
  const q=(window.__q||'').toLowerCase();
  let items=list.filter(i=>!q||JSON.stringify(i).toLowerCase().includes(q));
  if(cfg.sort) items=items.slice().sort((a,b)=>String(a[cfg.sort]||'zzz').localeCompare(String(b[cfg.sort]||'zzz')));
  const head=`<div class="row" style="margin-bottom:20px">
      <input class="inp" style="max-width:280px" placeholder="Search" value="${esc(window.__q||'')}" oninput="window.__q=this.value;render()">
      <div class="spacer"></div>
      <span class="muted small">${list.length} ${list.length===1?cfg.singular:cfg.singular+'s'}</span>
      <button class="btn btn-g" onclick="openForm('${cfg.key}')">＋ ${cfg.add}</button>
    </div>`;
  if(!items.length) return head+emptyState(cfg);
  const render1=i=>cardHTML(cfg,i);
  if(cfg.groupBy){
    const groups={};
    items.forEach(i=>{ const g=i[cfg.groupBy]||'Unsorted'; (groups[g]=groups[g]||[]).push(i); });
    const order=cfg.groupOrder?cfg.groupOrder.filter(g=>groups[g]):Object.keys(groups).sort();
    if(!cfg.groupOrder) order.sort();
    const extra=Object.keys(groups).filter(g=>!order.includes(g));
    return head+order.concat(extra).map(g=>`
      <div style="margin-bottom:26px">
        <div class="eyebrow" style="margin-bottom:11px">${esc(g)}</div>
        <div class="grid auto">${groups[g].map(render1).join('')}</div>
      </div>`).join('');
  }
  return head+`<div class="grid auto">${items.map(render1).join('')}</div>`;
}

    <div style="margin-top:16px"><button class="btn btn-o" onclick="openForm('${cfg.key}')">${cfg.add}</button></div>

}
function cardHTML(cfg,i){

  const lines=(c.lines||[]).filter(l=>l[1]!==''&&l[1]!=null&&l[1]!==undefined);
  return `<div class="card hoverable">
    <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">
      <div style="min-width:0">
        <h3 style="font-size:19px">${esc(c.title||'Untitled')}</h3>
        ${c.sub?`<div class="eyebrow" style="margin-top:3px">${esc(c.sub)}</div>`:''}
      </div>
      ${c.tag?`<span class="tag ${c.tagClass||''}">${esc(c.tag)}</span>`:''}
    </div>
    ${lines.length?`<div class="divider"></div><div style="display:grid;gap:6px">${lines.map(l=>
      `<div style="display:flex;justify-content:space-between;gap:12px;font-size:13px"><span class="muted">${esc(l[0])}</span><span style="text-align:right">${esc(l[1])}</span></div>`).join('')}</div>`:''}
    ${c.note?`<div class="small muted" style="margin-top:12px;font-style:italic">${esc(c.note)}</div>`:''}
    <div class="row" style="margin-top:14px">
      ${c.link?`<a class="btn btn-o" href="${esc(c.link)}" target="_blank" rel="noopener">Open link</a>`:''}
      <div class="spacer"></div>
      <button class="btn btn-q" onclick="openForm('${cfg.key}','${i.id}')">Edit</button>
      <button class="btn btn-q btn-danger" onclick="delItem('${cfg.key}','${i.id}')">Delete</button>

}
function delItem(key,id){ if(!confirm('Delete this permanently?')) return; S[key]=S[key].filter(x=>x.id!==id); commit('Deleted an item'); }

/* ---------- Modal form ---------- */
function fieldHTML(f,v){
  const val=v===undefined||v===null?'':v;
  if(f.t==='textarea') return `<textarea class="inp" name="${f.k}">${esc(val)}</textarea>`;
  if(f.t==='select') return `<select class="inp" name="${f.k}"><option value="">—</option>${f.o.map(o=>`<option ${o===val?'selected':''}>${esc(o)}</option>`).join('')}</select>`;
  const type=f.t==='date'?'date':f.t==='time'?'time':(f.t==='number'||f.t==='money')?'number':'text';
  const step=f.t==='money'?' step="0.01"':'';
  return `<input class="inp" type="${type}"${step} name="${f.k}" value="${esc(val)}">`;
}
function openForm(key,id){
  const cfg=COLLECTIONS[key];
  const item=id?S[key].find(x=>x.id===id):{};
  const body=`<div class="fieldrow">${cfg.fields.map(f=>
    `<div class="field" style="${f.t==='textarea'?'flex:1 1 100%':''}"><label class="f">${esc(f.l)}</label>${fieldHTML(f,item[f.k])}</div>`).join('')}</div>`;
  modal(id?('Edit '+cfg.singular):cfg.add,body,form=>{
    const data=id?item:{id:uid()};
    cfg.fields.forEach(f=>{ data[f.k]=form.querySelector(`[name="${f.k}"]`).value; });
    if(!id) S[key].push(data);
    commit(id?`Updated ${data.name||cfg.singular}`:`Added ${data.name||cfg.singular}`);
  });
}

  const bg=document.createElement('div'); bg.className='modal-bg';
  bg.innerHTML=`<div class="modal"><div class="modal-h"><h3>${esc(title)}</h3><button class="iconbtn" data-x>✕</button></div>
    <form class="modal-b"></form><div class="modal-f"><button class="btn btn-o" data-x>Cancel</button><button class="btn btn-p" data-save>${saveLabel||'Save'}</button></div></div>`;
  bg.querySelector('.modal-b').innerHTML=bodyHTML;
  document.body.appendChild(bg);
  const close=()=>bg.remove();
  bg.querySelectorAll('[data-x]').forEach(b=>b.onclick=close);
  bg.onclick=e=>{ if(e.target===bg) close(); };
  bg.querySelector('[data-save]').onclick=()=>{ onSave(bg.querySelector('.modal-b')); close(); };
  bg.querySelector('form').onsubmit=e=>e.preventDefault();
  setTimeout(()=>{ const f=bg.querySelector('.inp'); if(f) f.focus(); },80);
  document.addEventListener('keydown',function k(e){ if(e.key==='Escape'){close();document.removeEventListener('keydown',k);} });
}

}

<script>

function ringSVG(pct){

  return `<svg viewBox="0 0 212 212">
    <circle class="ringtrack" cx="106" cy="106" r="${r}" fill="none" stroke-width="6"/>
    <circle class="ringfill" cx="106" cy="106" r="${r}" fill="none" stroke-width="6"
      stroke-dasharray="${c}" stroke-dashoffset="${c*(1-pct/100)}"/>
  </svg>`;
}
function petalField(){
  let p='';
  const seeds=[[6,18,10,.28],[22,72,7,.22],[88,12,9,.25],[70,84,12,.2],[45,8,6,.24],[94,58,8,.18],[15,45,5,.2],[60,40,4,.16]];
  seeds.forEach(([x,y,s,o],i)=>{
    p+=`<g transform="translate(${x}%, ${y}%) rotate(${i*37})" opacity="${o}">
      <ellipse rx="${s}" ry="${s*1.7}" fill="var(--blush-deep)"/>
      <ellipse rx="${s*1.7}" ry="${s}" fill="var(--sage)"/>
      <circle r="${s*0.42}" fill="var(--gold)"/></g>`;
  });
  return `<svg class="petals" viewBox="0 0 100 100" preserveAspectRatio="none">${p}</svg>`;
}
function vDashboard(){

  const countNum=dl===null?'—':Math.abs(dl);

  return `

    ${petalField()}
    <div class="hero-inner">
      <div class="eyebrow">${d.date?fmtDate(d.date):'Date to be set'}${d.venue?' · '+esc(d.venue):''}</div>
      <div class="names" style="margin-top:8px">${names}</div>
      <div class="ring">${ringSVG(pr)}<div class="mid"><div class="num">${countNum}</div><div class="lbl">${countLabel}</div></div></div>
      <div class="pills">
        <div class="pillstat">Planning <b>${pr}% complete</b></div>
        <div class="pillstat"><b>${openTasks.length}</b> tasks left</div>
        <div class="pillstat"><b>${confirmed}</b> guests confirmed</div>

      </div>
    </div>
  </section>

  <div class="grid g3" style="margin-top:22px">
    <div class="card">
      <div class="card-h"><h3>Next up</h3><span class="spacer"></span><a href="#checklist" class="small">All tasks</a></div>
      ${upcoming.length?upcoming.map(t=>`
        <div class="task">
          <button class="check ${t.done?'on':''}" onclick="toggleTask('${t.id}')">✓</button>
          <div class="tt"><div class="tname">${esc(t.name)}</div>
          <div class="tmeta"><span class="tag grey">${esc(t.phase)}</span>${t.due?`<span class="tiny muted">${fmtDate(t.due)}</span>`:''}</div></div>
        </div>`).join(''):'<div class="empty small">Every task is done. Go get a coffee.</div>'}

    <div class="card">

    <div class="card">
      <div class="card-h"><h3>Replies</h3><span class="spacer"></span><a href="#guests" class="small">Guest list</a></div>
      ${['Confirmed','Pending','Declined'].map(st=>{
        const n=S.guests.filter(g=>(g.rsvp||'Pending')===st).length;
        const pct=S.guests.length?n/S.guests.length*100:0;
        return `<div style="margin-bottom:12px"><div class="row small"><span>${st}</span><span class="spacer"></span><b>${n}</b></div>
          <div class="bar" style="margin-top:5px"><i style="width:${pct}%"></i></div></div>`;
      }).join('')}
      <div class="small muted">${S.guests.length} guests invited in total</div>
    </div>
  </div>

  <div class="grid g3" style="margin-top:18px">
    <div class="card span2">
      <div class="card-h"><h3>Weather for the week</h3><span class="spacer"></span><span class="small muted">${esc(d.city||'Add your city in Wedding Details')}</span></div>

    <div class="card" style="background:linear-gradient(150deg,var(--champagne),var(--paper));display:flex;flex-direction:column;justify-content:center">
      ${petalSVG(64)}

    </div>
  </div>

  <div class="grid g2" style="margin-top:18px">
    <div class="card">
      <div class="card-h"><h3>Moodboard</h3><span class="spacer"></span><a href="#inspiration" class="small">Open gallery</a></div>
      ${gal.length?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">${gal.map(g=>
        `<div style="aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--champagne)"><img src="${g.src}" style="width:100%;height:100%;object-fit:cover"></div>`).join('')}</div>`
        :'<div class="empty small">Save a few images in Inspiration and they will show up here.</div>'}
    </div>
    <div class="card">
      <div class="card-h"><h3>Latest activity</h3></div>
      ${S.activity.length?S.activity.slice(0,7).map(a=>
        `<div class="row small" style="padding:7px 0;border-bottom:1px solid var(--line)"><span>${esc(a.text)}</span><span class="spacer"></span><span class="tiny muted">${new Date(a.at).toLocaleDateString(undefined,{month:'short',day:'numeric'})}</span></div>`).join('')
        :'<div class="empty small">Your changes will be listed here as you plan.</div>'}
    </div>

}
const WX={0:['Clear','☀️'],1:['Mostly clear','🌤'],2:['Partly cloudy','⛅️'],3:['Overcast','☁️'],45:['Fog','🌫'],48:['Fog','🌫'],51:['Light drizzle','🌦'],53:['Drizzle','🌦'],55:['Drizzle','🌦'],61:['Light rain','🌧'],63:['Rain','🌧'],65:['Heavy rain','🌧'],71:['Snow','🌨'],73:['Snow','🌨'],75:['Snow','🌨'],80:['Showers','🌦'],81:['Showers','🌧'],82:['Heavy showers','⛈'],95:['Thunderstorm','⛈'],96:['Thunderstorm','⛈'],99:['Thunderstorm','⛈']};
async function loadWeather(){
  const el=document.getElementById('wx'); if(!el) return;
  const city=S.details.city;
  if(!city){ el.textContent='Add the city of your venue in Wedding Details and the forecast will appear here.'; return; }
  try{
    const g=await fetch('https://geocoding-api.open-meteo.com/v1/search?count=1&name='+encodeURIComponent(city)).then(r=>r.json());
    if(!g.results||!g.results.length){ el.textContent='That city was not found. Try a nearby larger town.'; return; }
    const {latitude,longitude,name,country}=g.results[0];
    const f=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weather_code,temperature_2m_max,temperature_2m_min&forecast_days=16&timezone=auto`).then(r=>r.json());
    const days=f.daily.time.map((t,i)=>({t,code:f.daily.weather_code[i],hi:Math.round(f.daily.temperature_2m_max[i]),lo:Math.round(f.daily.temperature_2m_min[i])}));
    const wed=S.details.date;
    const show=wed&&days.some(d=>d.t===wed)?days.slice(Math.max(0,days.findIndex(d=>d.t===wed)-3),Math.max(0,days.findIndex(d=>d.t===wed)-3)+7):days.slice(0,7);
    el.innerHTML=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;text-align:center">${show.map(d=>{
      const w=WX[d.code]||['—','·'];
      const isWed=d.t===wed;
      return `<div style="padding:12px 4px;border-radius:14px;background:${isWed?'linear-gradient(150deg,var(--blush),var(--champagne))':'var(--field)'}">
        <div class="tiny muted">${new Date(d.t+'T12:00:00').toLocaleDateString(undefined,{weekday:'short'})}</div>
        <div style="font-size:21px;margin:5px 0">${w[1]}</div>
        <div style="font-size:13px"><b>${d.hi}°</b> <span class="muted">${d.lo}°</span></div>
        ${isWed?'<div class="tiny" style="color:var(--gold);margin-top:4px">The day</div>':''}
      </div>`;}).join('')}</div>
      <div class="tiny muted" style="margin-top:10px">${esc(name)}, ${esc(country||'')} · forecast in °C from Open-Meteo</div>`;
  }catch(e){ el.textContent='The forecast needs an internet connection. Everything else works offline.'; }
}

const DETAIL_FIELDS=[
  ['partnerA','First partner'],['partnerB','Second partner'],['date','Wedding date','date'],['time','Ceremony time','time'],
  ['venue','Venue name'],['city','City'],['ceremony','Ceremony location and details','textarea'],['reception','Reception location and details','textarea'],
  ['theme','Theme or style'],['dress','Dress code'],['guestCount','Expected guests','number'],['website','Wedding website'],['hashtag','Instagram hashtag']
];

}

/* ============================================================
   Timeline
   ============================================================ */
let calMonth=new Date().getMonth(), calYear=new Date().getFullYear();
function vTimeline(){
  const first=new Date(calYear,calMonth,1), start=new Date(first); start.setDate(1-first.getDay());
  const cells=[];
  for(let i=0;i<42;i++){ const d=new Date(start); d.setDate(start.getDate()+i); cells.push(d); }
  const iso=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const evOn=day=>{
    const k=iso(day); const out=[];
    S.events.filter(e=>e.date===k).forEach(e=>out.push(e.name));
    S.tasks.filter(t=>t.due===k&&!t.done).forEach(t=>out.push('☐ '+t.name));
    S.beauty.filter(b=>b.date===k).forEach(b=>out.push('💄 '+b.name));
    return out;
  };
  const upcoming=S.events.filter(e=>e.date>=todayISO()).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);
  return `
  <div class="row" style="margin-bottom:18px">
    <button class="iconbtn" onclick="calStep(-1)">‹</button>
    <h2 style="font-size:26px;min-width:220px">${new Date(calYear,calMonth,1).toLocaleDateString(undefined,{month:'long',year:'numeric'})}</h2>
    <button class="iconbtn" onclick="calStep(1)">›</button>
    <button class="btn btn-o" onclick="calToday()">Today</button>
    <div class="spacer"></div>
    <button class="btn btn-g" onclick="addEvent()">＋ Add event</button>
  </div>
  <div class="card">
    <div class="cal">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="dow">${d}</div>`).join('')}
    ${cells.map(d=>{
      const k=iso(d), evs=evOn(d);
      const cls=['cell']; if(d.getMonth()!==calMonth) cls.push('out');
      if(k===todayISO()) cls.push('today'); if(k===S.details.date) cls.push('wed');
      return `<div class="${cls.join(' ')}" onclick="addEvent('${k}')">
        <div class="d">${d.getDate()}</div>
        ${k===S.details.date?'<div class="ev" style="border-color:var(--blush-deep)">💍 Wedding day</div>':''}
        ${evs.slice(0,3).map(e=>`<div class="ev">${esc(e)}</div>`).join('')}
        ${evs.length>3?`<div class="tiny muted">+${evs.length-3} more</div>`:''}
      </div>`;
    }).join('')}</div>
  </div>
  <div class="card" style="margin-top:18px">
    <div class="card-h"><h3>Coming up</h3></div>
    ${upcoming.length?upcoming.map(e=>`<div class="row" style="padding:10px 0;border-bottom:1px solid var(--line)">
      <div><b>${esc(e.name)}</b><div class="tiny muted">${esc(e.place||'')}${e.time?' · '+e.time:''}</div></div>
      <div class="spacer"></div><span class="tag">${fmtDate(e.date)}</span>
      <button class="btn btn-q btn-danger" onclick="S.events=S.events.filter(x=>x.id!=='${e.id}');commit('Removed an event')">Remove</button>
    </div>`).join(''):'<div class="empty small">Add the rehearsal, the tastings, the fittings — anything with a date.</div>'}
  </div>`;
}
function calStep(n){ calMonth+=n; if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++;} render(); }
function calToday(){ const n=new Date(); calMonth=n.getMonth(); calYear=n.getFullYear(); render(); }
function addEvent(date){
  modal('Add event',`<div class="field"><label class="f">Event</label><input class="inp" name="name"></div>
    <div class="fieldrow"><div class="field"><label class="f">Date</label><input class="inp" type="date" name="date" value="${date||todayISO()}"></div>
    <div class="field"><label class="f">Time</label><input class="inp" type="time" name="time"></div></div>
    <div class="field"><label class="f">Place</label><input class="inp" name="place"></div>
    <div class="field"><label class="f">Notes</label><textarea class="inp" name="note"></textarea></div>`,
    f=>{ const g=n=>f.querySelector(`[name=${n}]`).value; if(!g('name')) return;
      S.events.push({id:uid(),name:g('name'),date:g('date'),time:g('time'),place:g('place'),note:g('note')}); commit('Added '+g('name')); });
}

/* ============================================================
   Checklist
   ============================================================ */
let taskFilter='open';
function vChecklist(){
  const pr=progress();
  const filters=[['all','Everything'],['open','Still to do'],['done','Done'],['star','Starred'],['soon','Due soon']];
  const match=t=>taskFilter==='all'||(taskFilter==='open'&&!t.done)||(taskFilter==='done'&&t.done)||(taskFilter==='star'&&t.star)||
    (taskFilter==='soon'&&!t.done&&t.due&&t.due<=new Date(Date.now()+14*864e5).toISOString().slice(0,10));
  return `
  <div class="card" style="margin-bottom:18px">
    <div class="row"><div><div class="stat">${pr}%</div><div class="small muted">${S.tasks.filter(t=>t.done).length} of ${S.tasks.length} tasks complete</div></div>
      <div class="spacer"></div><button class="btn btn-g" onclick="addTask()">＋ Add task</button></div>
    <div class="bar" style="margin-top:16px"><i style="width:${pr}%"></i></div>
  </div>
  <div class="chips" style="margin-bottom:18px">${filters.map(([k,l])=>`<button class="chip ${taskFilter===k?'on':''}" onclick="taskFilter='${k}';render()">${l}</button>`).join('')}</div>
  ${PHASES.map(ph=>{
    const all=S.tasks.filter(t=>t.phase===ph);
    const list=all.filter(match);
    if(!all.length) return '';
    const done=all.filter(t=>t.done).length;
    const closed=S.collapsed[ph]?'closed':'';
    return `<div class="card phase ${closed}" style="margin-bottom:14px">
      <div class="phase-h" onclick="S.collapsed['${ph}']=!S.collapsed['${ph}'];save();render()">
        <span class="arrow">▼</span><span class="ph-title">${ph}</span>
        <span class="tag ${done===all.length?'sage':'grey'}">${done}/${all.length}</span>
        <span class="spacer"></span>
        <div class="bar" style="width:120px"><i style="width:${all.length?done/all.length*100:0}%"></i></div>
      </div>
      <div class="phase-b">${list.length?list.map(t=>taskHTML(t)).join(''):'<div class="small muted" style="padding:8px 4px">Nothing matches this filter here.</div>'}</div>
    </div>`;
  }).join('')}`;
}
function taskHTML(t){
  const overdue=!t.done&&t.due&&t.due<todayISO();
  return `<div class="task ${t.done?'done':''}">
    <button class="check ${t.done?'on':''}" onclick="toggleTask('${t.id}')" aria-label="Mark complete">✓</button>
    <div class="tt">
      <div class="tname">${esc(t.name)}</div>
      <div class="tmeta">
        ${t.due?`<span class="tag ${overdue?'blush':'grey'}">${overdue?'Overdue · ':''}${fmtDate(t.due)}</span>`:''}
        ${t.note?`<span class="tiny muted">${esc(t.note)}</span>`:''}
      </div>
    </div>
    <button class="star ${t.star?'on':''}" onclick="S.tasks.find(x=>x.id==='${t.id}').star=!S.tasks.find(x=>x.id==='${t.id}').star;save();render()">⭐</button>
    <button class="btn btn-q" onclick="editTask('${t.id}')">Edit</button>
  </div>`;
}
function toggleTask(id){ const t=S.tasks.find(x=>x.id===id); t.done=!t.done; save(); log((t.done?'Completed: ':'Reopened: ')+t.name); save(); buildNav(); render(); }
function addTask(){
  modal('Add task',`<div class="field"><label class="f">Task</label><input class="inp" name="name"></div>
    <div class="field"><label class="f">When</label><select class="inp" name="phase">${PHASES.map(p=>`<option>${p}</option>`).join('')}</select></div>
    <div class="field"><label class="f">Due date</label><input class="inp" type="date" name="due"></div>
    <div class="field"><label class="f">Notes</label><textarea class="inp" name="note"></textarea></div>`,
    f=>{ const g=n=>f.querySelector(`[name=${n}]`).value; if(!g('name')) return;
      S.tasks.push({id:uid(),name:g('name'),phase:g('phase'),due:g('due'),note:g('note'),done:false,star:false}); commit('Added task: '+g('name')); });
}
function editTask(id){
  const t=S.tasks.find(x=>x.id===id);
  modal('Edit task',`<div class="field"><label class="f">Task</label><input class="inp" name="name" value="${esc(t.name)}"></div>

/* ============================================================
   Budget
   ============================================================ */
function donut(data,total){
  const R=78,C=2*Math.PI*R; let off=0;
  const hues=['var(--gold)','var(--blush-deep)','var(--sage-deep)','var(--champagne-deep)','var(--sage)','var(--gold-soft)','var(--blush)'];
  const arcs=data.map((d,i)=>{
    const frac=total?d.v/total:0, len=C*frac;
    const el=`<circle cx="100" cy="100" r="${R}" fill="none" stroke="${hues[i%hues.length]}" stroke-width="22"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 100 100)"/>`;
    off+=len; return el;
  }).join('');
  return `<svg viewBox="0 0 200 200" style="width:190px;height:190px">
    <circle cx="100" cy="100" r="${R}" fill="none" stroke="var(--field)" stroke-width="22"/>${arcs}</svg>`;
}
function vBudget(){
  const sp=spent(), cm=committed(), left=S.budgetTotal-sp;
  const byCat={};
  S.expenses.forEach(e=>{ const c=e.category||'Miscellaneous'; byCat[c]=(byCat[c]||0)+(Number(e.paid)||Number(e.estimate)||0); });
  const data=Object.entries(byCat).map(([k,v])=>({k,v})).sort((a,b)=>b.v-a.v);
  const total=data.reduce((a,d)=>a+d.v,0);
  const hues=['var(--gold)','var(--blush-deep)','var(--sage-deep)','var(--champagne-deep)','var(--sage)','var(--gold-soft)','var(--blush)'];
  return `
  <div class="grid g3" style="margin-bottom:18px">
    <div class="card"><div class="eyebrow">Total budget</div>
      <input class="inp" type="number" value="${S.budgetTotal}" style="font-size:26px;font-family:'Cormorant Garamond',serif;margin-top:8px"
        onchange="S.budgetTotal=Number(this.value)||0;commit('Updated the budget')"></div>
    <div class="card"><div class="eyebrow">Paid so far</div><div class="stat" style="margin-top:8px">${money(sp)}</div>
      <div class="bar" style="margin-top:12px"><i style="width:${Math.min(100,S.budgetTotal?sp/S.budgetTotal*100:0)}%"></i></div></div>
    <div class="card"><div class="eyebrow">Remaining</div><div class="stat" style="margin-top:8px;color:${left<0?'#B4685E':'inherit'}">${money(left)}</div>
      <div class="small muted" style="margin-top:8px">${money(cm)} committed across ${S.expenses.length} entries</div></div>
  </div>

  <div class="split left" style="margin-bottom:18px">
    <div class="card" style="text-align:center">
      <div class="card-h"><h3>By category</h3></div>
      ${total?donut(data,total):'<div class="empty small">Add an expense to see the breakdown.</div>'}
    </div>
    <div class="card">
      <div class="card-h"><h3>Where it goes</h3><span class="spacer"></span><button class="btn btn-g" onclick="addExpense()">＋ Add expense</button></div>
      ${data.length?data.map((d,i)=>`<div style="margin-bottom:11px">
        <div class="row small"><span style="display:inline-block;width:9px;height:9px;border-radius:9px;background:${hues[i%hues.length]}"></span>
        <span>${esc(d.k)}</span><span class="spacer"></span><b>${money(d.v)}</b><span class="muted tiny">${Math.round(d.v/total*100)}%</span></div>
        <div class="bar" style="margin-top:5px"><i style="width:${d.v/total*100}%"></i></div></div>`).join('')
        :'<div class="empty small">Nothing recorded yet.</div>'}
    </div>
  </div>

  <div class="card">
    <div class="card-h"><h3>Every expense</h3></div>
    ${S.expenses.length?`<div class="tablewrap"><table>
      <thead><tr><th>Item</th><th>Category</th><th>Estimated</th><th>Paid</th><th>Status</th><th>Due</th><th></th></tr></thead>
      <tbody>${S.expenses.map(e=>`<tr>
        <td><b>${esc(e.name)}</b><div class="tiny muted">${esc(e.vendor||'')}</div></td>
        <td class="muted">${esc(e.category||'')}</td>
        <td>${e.estimate?money(e.estimate):'—'}</td>
        <td>${e.paid?money(e.paid):'—'}</td>
        <td><span class="tag ${e.status==='Paid in full'?'sage':e.status==='Overdue'?'blush':'grey'}">${esc(e.status||'Planned')}</span></td>
        <td class="muted">${e.due?fmtDate(e.due):'—'}</td>
        <td style="text-align:right;white-space:nowrap">
          <button class="btn btn-q" onclick="addExpense('${e.id}')">Edit</button>
          <button class="btn btn-q btn-danger" onclick="S.expenses=S.expenses.filter(x=>x.id!=='${e.id}');commit('Deleted an expense')">Delete</button></td>
      </tr>`).join('')}</tbody></table></div>`
      :'<div class="empty"><div class="big">No expenses yet</div><div class="small">Add the deposits first — they tell you the most.</div></div>'}
  </div>`;
}
function addExpense(id){
  const e=id?S.expenses.find(x=>x.id===id):{};
  modal(id?'Edit expense':'Add expense',`
    <div class="fieldrow">
      <div class="field"><label class="f">Item</label><input class="inp" name="name" value="${esc(e.name||'')}"></div>
      <div class="field"><label class="f">Category</label><select class="inp" name="category">${BUDGET_CATS.map(c=>`<option ${c===e.category?'selected':''}>${c}</option>`).join('')}</select></div>

      <div class="field"><label class="f">Status</label><select class="inp" name="status">${['Planned','Deposit paid','Partly paid','Paid in full','Overdue'].map(s=>`<option ${s===e.status?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="field"><label class="f">Payment method</label><input class="inp" name="method" value="${esc(e.method||'')}"></div>
      <div class="field"><label class="f">Instalments</label><input class="inp" name="installments" value="${esc(e.installments||'')}" placeholder="3 of 5"></div>
      <div class="field"><label class="f">Next payment due</label><input class="inp" type="date" name="due" value="${esc(e.due||'')}"></div>

    </div>`,

}
</script>
<script>

  });

    ${list.length?`<div class="tablewrap"><table>
      <thead><tr><th>Guest</th><th>Group</th><th>Contact</th><th>Table</th><th>Dietary</th><th>RSVP</th><th></th></tr></thead>
      <tbody>${list.map(g=>`<tr>
        <td><b>${esc(g.first)} ${esc(g.last)}</b>${g.family?`<div class="tiny muted">${esc(g.family)}</div>`:''}</td>
        <td class="muted">${esc(g.group||'—')}</td>
        <td class="small">${esc(g.email||'')}<div class="tiny muted">${esc(g.phone||'')}</div></td>
        <td class="muted">${esc(g.table||'—')}</td>
        <td class="small">${esc(g.diet||'—')}</td>
        <td>${['Confirmed','Pending','Declined'].map(r=>
          `<button class="chip ${(g.rsvp||'Pending')===r?'on':''}" style="padding:3px 9px;font-size:11px" onclick="setRSVP('${g.id}','${r}')">${r[0]}</button>`).join(' ')}</td>
        <td style="text-align:right;white-space:nowrap"><button class="btn btn-q" onclick="addGuest('${g.id}')">Edit</button>
          <button class="btn btn-q btn-danger" onclick="S.guests=S.guests.filter(x=>x.id!=='${g.id}');commit('Removed a guest')">Delete</button></td>
      </tr>`).join('')}</tbody></table></div>`
      :`<div class="empty">${petalSVG(58)}<div class="big">No guests in this view</div><div class="small">Add the people you cannot imagine the day without, then work outwards.</div>

  </div>`;

function setRSVP(id,r){ const g=S.guests.find(x=>x.id===id); g.rsvp=r; commit(`${g.first} ${g.last} — ${r.toLowerCase()}`); }
function addGuest(id){
  const g=id?S.guests.find(x=>x.id===id):{};
  modal(id?'Edit guest':'Add guest',`<div class="fieldrow">
    <div class="field"><label class="f">First name</label><input class="inp" name="first" value="${esc(g.first||'')}"></div>
    <div class="field"><label class="f">Last name</label><input class="inp" name="last" value="${esc(g.last||'')}"></div>

    <div class="field"><label class="f">Dietary needs</label><input class="inp" name="diet" value="${esc(g.diet||'')}"></div>
    <div class="field"><label class="f">Gift received</label><input class="inp" name="gift" value="${esc(g.gift||'')}"></div>
    <div class="field" style="flex:1 1 100%"><label class="f">Notes</label><textarea class="inp" name="note">${esc(g.note||'')}</textarea></div>
  </div>`,
  f=>{ const q=n=>f.querySelector(`[name=${n}]`).value; const d=id?g:{id:uid()};
    ['first','last','family','group','email','phone','rsvp','table','diet','gift','note'].forEach(k=>d[k]=q(k));

function nudgeList(){
  const p=S.guests.filter(g=>(g.rsvp||'Pending')==='Pending');
  modal('Still waiting to hear from',`<p class="small muted" style="margin-bottom:14px">${p.length} guests have not replied. Copy the list and send a gentle reminder.</p>
    <textarea class="inp" style="min-height:200px" readonly>${esc(p.map(g=>`${g.first} ${g.last}${g.email?' — '+g.email:''}${g.phone?' — '+g.phone:''}`).join('\n'))}</textarea>`,
    ()=>{},'Close');
}

/* ============================================================
   Seating chart
   ============================================================ */
function vSeating(){
  const seated=new Set();
  S.tables.forEach(t=>(t.guests||[]).forEach(g=>seated.add(g)));
  const pool=S.guests.filter(g=>(g.rsvp||'Pending')!=='Declined'&&!seated.has(g.id));
  const nameOf=id=>{ const g=S.guests.find(x=>x.id===id); return g?`${g.first} ${g.last}`:'Removed guest'; };
  return `
  <div class="row" style="margin-bottom:18px">
    <span class="small muted">Drag a name onto a table. Drag it back to the list to unseat them.</span>
    <div class="spacer"></div>
    <button class="btn btn-g" onclick="addTable()">＋ Add table</button>
  </div>
  <div class="card" style="margin-bottom:18px">
    <div class="card-h"><h3>Not seated yet</h3><span class="spacer"></span><span class="tag">${pool.length}</span></div>
    <div class="pool" id="pool" ondragover="event.preventDefault()" ondrop="dropTo(event,null)">
      ${pool.length?pool.map(g=>`<span class="seatpill" draggable="true" data-g="${g.id}" ondragstart="dragG(event,'${g.id}')">${esc(g.first)} ${esc(g.last)}</span>`).join('')
      :'<div class="small muted">Everyone has a seat.</div>'}
    </div>
  </div>
  ${S.tables.length?`<div class="tables">${S.tables.map(t=>{
    const g=t.guests||[];
    const over=g.length>Number(t.seats||0)&&t.seats;
    return `<div class="tbl" ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')" ondrop="dropTo(event,'${t.id}')">
      <h4>${esc(t.name)}<span class="tag ${over?'blush':'grey'}">${g.length}${t.seats?'/'+t.seats:''}</span></h4>
      <div class="tiny muted" style="margin-bottom:6px">${esc(t.kind||'')}</div>
      <div>${g.map(id=>`<span class="seatpill" draggable="true" ondragstart="dragG(event,'${id}')">${esc(nameOf(id))}<button class="btn-q tiny" style="padding:0 2px" onclick="unseat('${id}')">✕</button></span>`).join('')||'<div class="tiny muted">Empty</div>'}</div>
      <div class="row" style="margin-top:10px"><button class="btn btn-q" onclick="addTable('${t.id}')">Edit</button>
        <button class="btn btn-q btn-danger" onclick="S.tables=S.tables.filter(x=>x.id!=='${t.id}');commit('Removed a table')">Delete</button></div>
    </div>`;}).join('')}</div>`
  :`<div class="card"><div class="empty">${petalSVG(58)}<div class="big">No tables yet</div>
    <div class="small">Start with the head table, then add the rest.</div>
    <div style="margin-top:16px"><button class="btn btn-o" onclick="addTable()">Add your first table</button></div></div></div>`}`;
}
let dragId=null;
function dragG(e,id){ dragId=id; e.dataTransfer.effectAllowed='move'; }
function dropTo(e,tableId){
  e.preventDefault(); document.querySelectorAll('.tbl').forEach(t=>t.classList.remove('over'));
  if(!dragId) return;
  S.tables.forEach(t=>t.guests=(t.guests||[]).filter(g=>g!==dragId));
  if(tableId){ const t=S.tables.find(x=>x.id===tableId); t.guests=t.guests||[]; t.guests.push(dragId);
    const g=S.guests.find(x=>x.id===dragId); if(g){ g.table=t.name; } }
  else { const g=S.guests.find(x=>x.id===dragId); if(g) g.table=''; }
  dragId=null; commit('Updated the seating chart');
}
function unseat(id){ S.tables.forEach(t=>t.guests=(t.guests||[]).filter(g=>g!==id));
  const g=S.guests.find(x=>x.id===id); if(g) g.table=''; commit('Unseated a guest'); }
function addTable(id){
  const t=id?S.tables.find(x=>x.id===id):{};
  modal(id?'Edit table':'Add table',`
    <div class="field"><label class="f">Name</label><input class="inp" name="name" value="${esc(t.name||'')}" placeholder="Table 1"></div>
    <div class="field"><label class="f">Seats</label><input class="inp" type="number" name="seats" value="${esc(t.seats||8)}"></div>
    <div class="field"><label class="f">Type</label><select class="inp" name="kind">${['Guest table','Head table','Family table','VIP table','Kids table','Cocktail table'].map(k=>`<option ${k===t.kind?'selected':''}>${k}</option>`).join('')}</select></div>`,
    f=>{ const g=n=>f.querySelector(`[name=${n}]`).value; const d=id?t:{id:uid(),guests:[]};
      d.name=g('name')||'Table'; d.seats=g('seats'); d.kind=g('kind');
      if(!id) S.tables.push(d); commit(id?'Updated a table':'Added '+d.name); });
}

   Inspiration gallery
   ============================================================ */

const GAL_CATS=['Flowers','Dress','Hair','Makeup','Decor','Cake','Table settings','Stationery','Venue','Photography','Honeymoon','Other'];

    <label class="btn btn-g">＋ Add images<input type="file" accept="image/*" multiple hidden onchange="addImages(this.files)"></label>

  ${items.length?`<div class="gallery">${items.map(g=>`
    <div class="gitem">
      <img src="${g.src}" alt="${esc(g.note||'')}" loading="lazy">
      <div class="cap"><span>${esc(g.cat||'')}${g.note?' · '+esc(g.note):''}</span>
        <span><button onclick="S.gallery.find(x=>x.id==='${g.id}').fav=!S.gallery.find(x=>x.id==='${g.id}').fav;commit('Updated a favourite')" style="color:#fff">${g.fav?'♥':'♡'}</button>
        <button onclick="if(confirm('Remove this image?')){S.gallery=S.gallery.filter(x=>x.id!=='${g.id}');commit('Removed an image')}" style="color:#fff">✕</button></span></div>
    </div>`).join('')}</div>`
  :`<div class="card"><div class="empty">${petalSVG(58)}<div class="big">Your moodboard is empty</div>
    <div class="small">Save the images you keep coming back to. They become the brief you hand your florist.</div></div></div>`}`;

function addImages(files){
  const cat=prompt('Which category? ('+GAL_CATS.join(', ')+')','Flowers')||'Other';
  [...files].forEach(file=>{
    if(file.size>2.2e6){ toast('That image is too large — try one under 2 MB'); return; }

/* ============================================================
   Documents

function vDocuments(){

      <td style="text-align:right;white-space:nowrap">
        ${d.src||d.link?`<a class="btn btn-q" href="${esc(d.src||d.link)}" target="_blank" rel="noopener" ${d.src?`download="${esc(d.name)}"`:''}>Open</a>`:''}

  :`<div class="card"><div class="empty">${petalSVG(58)}<div class="big">Nothing filed yet</div>
    <div class="small">Upload signed contracts and receipts, or save a link to where they live.</div></div></div>`}`;
}
function uploadDoc(file){
  if(!file) return;
  if(file.size>2.2e6){ toast('That file is too large — save a link to it instead'); return; }
  const r=new FileReader();
  r.onload=()=>{ S.documents.unshift({id:uid(),name:file.name,kind:file.type.includes('pdf')?'PDF':'File',src:r.result,added:todayISO(),vendor:'',note:''}); commit('Added '+file.name); };
  r.readAsDataURL(file);
}
function addDoc(){
  modal('Add a document link',`<div class="field"><label class="f">Name</label><input class="inp" name="name"></div>
    <div class="field"><label class="f">Link</label><input class="inp" name="link" placeholder="https://"></div>
    <div class="field"><label class="f">Type</label><select class="inp" name="kind">${['Contract','Receipt','Invoice','Permit','Insurance','Inspiration','Other'].map(k=>`<option>${k}</option>`).join('')}</select></div>
    <div class="field"><label class="f">Vendor</label><input class="inp" name="vendor"></div>
    <div class="field"><label class="f">Notes</label><textarea class="inp" name="note"></textarea></div>`,
    f=>{ const g=n=>f.querySelector(`[name=${n}]`).value; if(!g('name')) return;
      S.documents.unshift({id:uid(),name:g('name'),link:g('link'),kind:g('kind'),vendor:g('vendor'),note:g('note'),added:todayISO()}); commit('Added '+g('name')); });
}

/* ============================================================
   Notes
   ============================================================ */
function vNotes(){
  return `<div class="row" style="margin-bottom:18px"><span class="small muted">Ideas, phone numbers, half-thoughts at midnight.</span>
    <div class="spacer"></div><button class="btn btn-g" onclick="addNote()">＋ New note</button></div>
  ${S.notes.length?`<div class="grid auto">${S.notes.map(n=>`
    <div class="card hoverable" style="background:linear-gradient(160deg,var(--champagne),var(--paper))">
      <input class="inp" style="background:transparent;border:none;padding:0;font-family:'Cormorant Garamond',serif;font-size:20px"
        value="${esc(n.title)}" onchange="S.notes.find(x=>x.id==='${n.id}').title=this.value;save()">
      <textarea class="inp" style="background:transparent;border:none;padding:0;min-height:120px;margin-top:8px"
        oninput="S.notes.find(x=>x.id==='${n.id}').body=this.value;save()">${esc(n.body)}</textarea>
      <div class="row"><span class="tiny muted">${fmtDate(n.added)}</span><div class="spacer"></div>
        <button class="btn btn-q btn-danger" onclick="if(confirm('Delete this note?')){S.notes=S.notes.filter(x=>x.id!=='${n.id}');commit('Deleted a note')}">Delete</button></div>
    </div>`).join('')}</div>`
  :`<div class="card"><div class="empty">${petalSVG(58)}<div class="big">No notes yet</div><div class="small">Write the thing you keep forgetting to tell the florist.</div></div></div>`}`;
}
function addNote(){ S.notes.unshift({id:uid(),title:'Untitled note',body:'',added:todayISO()}); commit('Added a note'); }

/* ============================================================
   Wedding website preview
   ============================================================ */
function vWebsite(){
  const d=S.details;
  const url=d.website||'';
  const qr=url?`https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=8&data=${encodeURIComponent(url)}`:'';
  const conf=S.guests.filter(g=>g.rsvp==='Confirmed').length;
  const day=S.events.filter(e=>e.date===d.date).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  return `
  <div class="split right">
    <div class="site">
      <div class="site-hero">
        <div class="eyebrow">Together with their families</div>
        <div class="n" style="margin:14px 0">${esc(d.partnerA||'Partner one')}<span style="font-style:italic;color:var(--gold);padding:0 10px">&</span>${esc(d.partnerB||'Partner two')}</div>
        ${petalSVG(90)}
        <div class="eyebrow" style="margin-top:14px">${d.date?fmtDate(d.date):'Date to be announced'}${d.time?' · '+d.time:''}</div>
        <div class="small muted" style="margin-top:6px">${esc(d.venue||'')}${d.city?', '+esc(d.city):''}</div>
      </div>
      <div class="site-body">
        <div class="grid g3">
          <div><div class="eyebrow">Dress code</div><p>${esc(d.dress||'To be confirmed')}</p></div>
          <div><div class="eyebrow">Theme</div><p>${esc(d.theme||'To be confirmed')}</p></div>
          <div><div class="eyebrow">Hashtag</div><p>${esc(d.hashtag||'—')}</p></div>
        </div>
        <div class="divider"></div>
        <div class="eyebrow">The day</div>
        ${day.length?day.map(e=>`<div class="row" style="padding:8px 0;border-bottom:1px solid var(--line)">
          <span style="font-family:'Cormorant Garamond',serif;font-size:19px;min-width:74px">${esc(e.time||'—')}</span>
          <span>${esc(e.name)}</span><div class="spacer"></div><span class="tiny muted">${esc(e.place||'')}</span></div>`).join('')
          :`<p class="small muted">Add events on your wedding date in the Timeline and the running order will appear here.</p>`}
        <div class="divider"></div>
        <div class="grid g2">
          <div><div class="eyebrow">Ceremony</div><p class="small">${esc(d.ceremony||'Details to follow')}</p></div>
          <div><div class="eyebrow">Reception</div><p class="small">${esc(d.reception||'Details to follow')}</p></div>
        </div>
        <div class="divider"></div>
        <div class="row"><span class="small muted">${conf} guests have already said yes</span><div class="spacer"></div>
          ${url?`<a class="btn btn-g" href="${esc(url)}" target="_blank" rel="noopener">Open the live site</a>`:'<span class="small muted">Add your website address in Wedding Details</span>'}</div>
      </div>
    </div>
    <div class="stack">
      <div class="card" style="text-align:center">
        <div class="card-h"><h3 style="margin:0 auto">Guest QR code</h3></div>
        ${qr?`<img src="${qr}" alt="QR code" style="width:100%;max-width:220px;border-radius:16px;background:#fff;padding:10px">
          <p class="tiny muted" style="margin-top:10px">Print this on your signage and cards. It opens your wedding website.</p>`
          :'<p class="small muted">Add your website address in Wedding Details and a QR code will be generated here.</p>'}
      </div>
      <div class="card">
        <div class="card-h"><h3>Print this page</h3></div>
        <p class="small muted">Use it as a brief for your stationer, or hand it to the venue.</p>
        <button class="btn btn-o" style="margin-top:12px" onclick="window.print()">Print</button>
      </div>
    </div>
  </div>`;
}

/* ============================================================
   Settings
   ============================================================ */
function vSettings(){
  const dl=daysUntil();
  let anniv='';
  if(S.details.date&&dl!==null&&dl<0){
    const w=new Date(S.details.date+'T12:00:00'); const n=new Date();
    const next=new Date(n.getFullYear(),w.getMonth(),w.getDate()); if(next<n) next.setFullYear(n.getFullYear()+1);
    const years=next.getFullYear()-w.getFullYear();
    anniv=`<div class="card" style="background:linear-gradient(150deg,var(--blush),var(--paper))">
      <div class="eyebrow">Anniversary countdown</div>
      <div class="stat" style="margin-top:8px">${Math.ceil((next-n)/86400000)} days</div>
      <div class="small muted">until your ${years}${years===1?'st':years===2?'nd':years===3?'rd':'th'} anniversary</div></div>`;
  }
  return `${anniv?anniv+'<div style="height:18px"></div>':''}
  <div class="grid g2">
    <div class="card">
      <div class="card-h"><h3>Appearance</h3></div>
      <p class="small muted">Aurelia follows you between light and dark.</p>
      <div class="chips" style="margin-top:14px">
        <button class="chip ${S.theme==='light'?'on':''}" onclick="setTheme('light')">Light</button>
        <button class="chip ${S.theme==='dark'?'on':''}" onclick="setTheme('dark')">Dark</button>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><h3>Backup</h3></div>
      <p class="small muted">Everything lives in this browser only. Download a backup before you clear your history or switch devices.</p>
      <div class="row" style="margin-top:14px">
        <button class="btn btn-p" onclick="exportData()">Download backup</button>
        <label class="btn btn-o">Restore from file<input type="file" accept="application/json" hidden onchange="importData(this.files[0])"></label>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><h3>Your numbers</h3></div>
      <div class="row small" style="padding:6px 0"><span class="muted">Tasks</span><span class="spacer"></span>${S.tasks.length}</div>
      <div class="row small" style="padding:6px 0"><span class="muted">Guests</span><span class="spacer"></span>${S.guests.length}</div>
      <div class="row small" style="padding:6px 0"><span class="muted">Vendors</span><span class="spacer"></span>${S.vendors.length}</div>
      <div class="row small" style="padding:6px 0"><span class="muted">Expenses</span><span class="spacer"></span>${S.expenses.length}</div>
      <div class="row small" style="padding:6px 0"><span class="muted">Saved images</span><span class="spacer"></span>${S.gallery.length}</div>
    </div>
    <div class="card">
      <div class="card-h"><h3>Start over</h3></div>
      <p class="small muted">This clears everything and restores the original checklist. It cannot be undone, so download a backup first.</p>
      <button class="btn btn-danger" style="margin-top:14px;border:1px solid var(--line)" onclick="resetAll()">Erase everything</button>
    </div>
  </div>`;
}
function setTheme(t){ S.theme=t; document.documentElement.setAttribute('data-theme',t); save(); render(); }
function exportData(){
  const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download=`aurelia-wedding-backup-${todayISO()}.json`; a.click(); toast('Backup downloaded');
}
function importData(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d.tasks) throw 0; S=d; save(); toast('Backup restored'); buildNav(); render(); }
    catch(e){ toast('That file could not be read'); } };
  r.readAsText(file);
}
function resetAll(){ if(!confirm('Erase every detail and start again?')) return; S=blank(); save(); buildNav(); render(); toast('Everything reset'); }

/* ============================================================
   Router
   ============================================================ */
function render(){
  const v=document.getElementById('view');
  const m=MODULES.find(x=>x.id===route)||MODULES[1];
  document.getElementById('pageTitle').textContent=m.label;
  document.getElementById('pageSub').textContent=SUBS[route]||'';
  let html='';
  if(COLLECTIONS[route]) html=collView(COLLECTIONS[route]);
  else switch(route){
    case 'dashboard': html=vDashboard(); break;
    case 'details': html=vDetails(); break;
    case 'timeline': html=vTimeline(); break;
    case 'checklist': html=vChecklist(); break;
    case 'budget': html=vBudget(); break;
    case 'guests': html=vGuests(); break;
    case 'seating': html=vSeating(); break;
    case 'inspiration': html=vGallery(); break;
    case 'documents': html=vDocuments(); break;
    case 'notes': html=vNotes(); break;
    case 'website': html=vWebsite(); break;
    case 'settings': html=vSettings(); break;
    default: html=vDashboard();
  }
  v.innerHTML=html;
  if(route==='dashboard') loadWeather();
  buildNav();
}
window.addEventListener('hashchange',()=>{
  route=location.hash.replace('#','')||'dashboard';
  window.__q='';
  document.getElementById('sidebar').classList.remove('open');
  document.querySelector('.scrim')?.remove();
  window.scrollTo({top:0,behavior:'smooth'});
  render();
});
document.getElementById('themeBtn').onclick=()=>setTheme(S.theme==='dark'?'light':'dark');
document.getElementById('burger').onclick=()=>{
  const sb=document.getElementById('sidebar');
  sb.classList.add('open');
  const sc=document.createElement('div'); sc.className='scrim';
  sc.onclick=()=>{ sb.classList.remove('open'); sc.remove(); };
  document.body.appendChild(sc);
};
document.documentElement.setAttribute('data-theme',S.theme||'light');
buildNav();
render();
</script>
</body>
</html>
